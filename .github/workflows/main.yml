name: Build and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build PDF with Docker
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          PDF_BASE="mus-colab-${TIMESTAMP}"
          PDF_NAME="${PDF_BASE}.pdf"
          echo "Building PDF: $PDF_NAME"

          # `make pdf` runs check-ly (excerpt/inline .ly) then lilypond-book + LaTeX.
          make pdf

          # Copy the built PDF to the timestamped filename
          cp bin/main.pdf "$PDF_NAME"

          # Source bundle: exact tracked tree for this commit (zip — avoids stale build tree / bin/)
          SOURCE_ZIP="${PDF_BASE}-source.zip"
          git archive --format=zip -o "$SOURCE_ZIP" HEAD

          echo "PDF_NAME=$PDF_NAME" >> $GITHUB_ENV
          echo "SOURCE_ZIP_NAME=$SOURCE_ZIP" >> $GITHUB_ENV

      - name: Clean up build artifacts
        run: |
          # Remove LilyPond build artifacts but keep the PDF and source files
          rm -f *.log *.ly~ *.pdf~ 2>/dev/null || true
          # List what we're publishing
          echo "Files to publish:"
          test -f "${{ env.PDF_NAME }}"
          test -f "${{ env.SOURCE_ZIP_NAME }}"
          ls -lh "${{ env.PDF_NAME }}" "${{ env.SOURCE_ZIP_NAME }}"

      - name: Publish latest release (gh + git tag)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TARGET: ${{ github.sha }}
          PDF_NAME: ${{ env.PDF_NAME }}
          SOURCE_ZIP_NAME: ${{ env.SOURCE_ZIP_NAME }}
        run: |
          set -euo pipefail
          TAG=latest
          TITLE='Latest mus-colab PDF'
          NOTES="PDF and tracked source (git archive) at commit ${TARGET:0:7}."

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -f "$TAG" "$TARGET"
          git push --force origin "refs/tags/$TAG"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --target "$TARGET" --title "$TITLE" --notes "$NOTES"
            asset_ids=()
            mapfile -t asset_ids < <(gh api "repos/${GH_REPO}/releases/tags/${TAG}" --jq '.assets[].id')
            for id in "${asset_ids[@]}"; do
              [[ -n "$id" ]] || continue
              gh api --method DELETE "repos/${GH_REPO}/releases/assets/${id}"
            done
            gh release upload "$TAG" "$PDF_NAME" "$SOURCE_ZIP_NAME"
          else
            gh release create "$TAG" "$PDF_NAME" "$SOURCE_ZIP_NAME" \
              --target "$TARGET" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
