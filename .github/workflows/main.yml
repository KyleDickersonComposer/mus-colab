name: Build and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PDF with Docker
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          PDF_BASE="mus-colab-${TIMESTAMP}"
          PDF_NAME="${PDF_BASE}.pdf"
          echo "Building PDF: $PDF_NAME"

          # `make pdf` runs check-ly (excerpt/inline .ly) then lilypond-book + LaTeX.
          # Optional verbose snippet log first (second lilypond-book pass).
          make lily
          make pdf

          # Copy the built PDF to the timestamped filename
          cp bin/main.pdf "$PDF_NAME"

          echo "PDF_NAME=$PDF_NAME" >> $GITHUB_ENV

      - name: Clean up build artifacts
        run: |
          # Remove LilyPond build artifacts but keep the PDF and source files
          rm -f *.log *.ly~ *.pdf~ 2>/dev/null || true
          # List what we're publishing
          echo "Files to publish:"
          test -f "${{ env.PDF_NAME }}"
          ls -lh "${{ env.PDF_NAME }}"

      - name: Publish PDF to Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest mus-colab PDF"
          artifacts: "${{ env.PDF_NAME }}"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          draft: false
          prerelease: false
          makeLatest: true
          body: "Latest PDF build from the mus-colab template default branch."
          token: ${{ secrets.GITHUB_TOKEN }}
